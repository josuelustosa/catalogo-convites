<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <!-- Google Fonts: Montserrat-->
    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >
    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="./src/styles/style.css"
    >
    <link
        rel="stylesheet"
        href="./src/styles/global.css"
    >

    <title>Catálogo de Convites: Digitais, Interativos & Animados</title>
</head>

<body>
    <header>
        <h1>Convites Digitais, Interativos & Animados</h1>
    </header>

    <main>
        <!-- Cabeçalho da Listagem: título, filtros e pesquisa -->
        <nav>
            <h2>Catálogo de Convites</h2>
            <div class="nav-filters">
                <!-- Botões de Filtro: Digitais, Interativo e Animado -->
                <div
                    class="filter-buttons"
                    id="filter-buttons"
                ></div>
                <input
                    type="search"
                    class="search-input"
                    placeholder="Pesquisar convites..."
                    aria-label="Pesquisar convites"
                >
            </div>
        </nav>

        <!-- Container para os convites -->
        <section
            class="catalog-container"
            id="catalog"
        ></section>
    </main>

    <footer>
        <div>
            Convites Digitais, Interativos & Animados
        </div>
        <div>
            Desenvolvido por Josué Lustosa. Todos os Direitos Reservados.
        </div>
    </footer>

    <script
        type="module"
        src="./src/js/app.js"
    ></script>
    <script
        type="module"
        src="./src/js/filters.js"
    ></script>
</body>

</html>
